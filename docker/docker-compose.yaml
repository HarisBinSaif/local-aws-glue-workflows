# Local stack for running glue-airflow-local-generated DAGs against real PySpark
# in a Glue container, with MinIO standing in for S3.
#
# Run from the repo root:
#     docker compose -f docker/docker-compose.yaml up
#
# Airflow UI: http://localhost:8080  (login: airflow / airflow)
# MinIO UI:   http://localhost:9001  (login: minio / minio123)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ../docker/minio-init.sh:/init.sh:ro
      - ../examples/simple-etl/sample-input.csv:/seed/sample-input.csv:ro

  glue-runner:
    build:
      context: ..
      dockerfile: docker/glue-runner.Dockerfile
    container_name: glue-runner
    environment:
      # boto3 — picks up these env vars and routes S3 calls to MinIO.
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ENDPOINT_URL_S3: http://minio:9000
      # PySpark/Hadoop S3A is configured via spark-defaults.conf baked into the image.
    volumes:
      - ../examples/simple-etl/scripts:/scripts/scripts:ro
    depends_on:
      minio:
        condition: service_healthy

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../glue-airflow-local:/opt/glue-airflow-local
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        pip install -e /opt/glue-airflow-local
        airflow db migrate
        airflow users create --username airflow --password airflow --firstname Airflow --lastname User --role Admin --email airflow@example.com

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ../glue-airflow-local:/opt/glue-airflow-local
      - airflow-dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    command: >-
      bash -c "pip install -e /opt/glue-airflow-local && airflow scheduler"

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    ports:
      - "8080:8080"
    volumes:
      - ../glue-airflow-local:/opt/glue-airflow-local
      - airflow-dags:/opt/airflow/dags
    command: >-
      bash -c "pip install -e /opt/glue-airflow-local && airflow webserver"

volumes:
  postgres-data:
  minio-data:
  airflow-dags:
